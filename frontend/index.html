<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudCost Pro - Precision Infrastructure Estimation</title>
    <meta name="description" content="Premium Cloud Infrastructure Cost Calculator">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="container">
        <header>
            <h1>CloudCost <span class="highlight">Pro</span></h1>
            <p>Estimate your cloud infrastructure costs with precision.</p>
        </header>
        <div class="content-wrapper">
            <section class="calculator-panel">
            <form id="calculator-form">
                <div class="input-group">
                    <label for="provider">Cloud Provider</label>
                    <select id="provider" required>
                        <option value="" disabled selected>Select Provider</option>
                        <option value="aws">AWS (Amazon Web Services)</option>
                        <option value="gcp">GCP (Google Cloud)</option>
                        <option value="azure">Azure</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="instance-type">Instance Type</label>
                    <select id="instance-type" required disabled>
                        <option value="" disabled selected>Select Provider First</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="duration">Forecast Duration</label>
                    <div style="display: flex; gap: 1rem;">
                        <input type="number" id="duration" value="1" min="1" required style="flex: 1;">
                        <select id="duration-unit" style="flex: 1;">
                            <option value="1">Hours</option>
                            <option value="24">Days</option>
                            <option value="168">Weeks</option>
                            <option value="730" selected>Months</option>
                            <option value="8760">Years</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="storage">Attached Storage (GB)</label>
                    <input type="number" id="storage" value="20" min="0" required>
                </div>

                <button type="submit" class="btn-primary" id="calculate-btn">
                    <span>Calculate Cost</span>
                    <div class="loader hidden"></div>
                </button>
            </form>
        </section>

        <section class="results-panel hidden" id="results">
            <h2>Estimated Cost</h2>
            <div class="cost-cards">
                <div class="card">
                    <h3>Compute</h3>
                    <p class="amount" id="compute-cost">$0.00</p>
                </div>
                <div class="card">
                    <h3>Storage</h3>
                    <p class="amount" id="storage-cost">$0.00</p>
                </div>
                <div class="card total">
                    <h3>Total (Monthly)</h3>
                    <p class="amount" id="total-cost">$0.00</p>
                </div>
            </div>
            <div class="chart-container" style="margin-top: 2.5rem; position: relative; height: 300px; width: 100%;">
                <canvas id="costChart"></canvas>
            </div>
        </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
